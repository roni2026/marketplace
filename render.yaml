# BazarBD marketplace deploy hints for Render.
# If you use a Static Site, keep the rewrite so /admin loads the React app.
# If you use a Web Service (node), serve dist with a SPA fallback (see below).

services:
  - type: web
    name: bazarbd-marketplace
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      # Critical: without this, opening /admin hits the host (not React) and "redirects" away
      - type: rewrite
        source: /*
        destination: /index.html
